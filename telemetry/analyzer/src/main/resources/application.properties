spring.application.name=analyzer

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false

analyzer.kafka.consumer.snapshots.group-id=analyzer-snapshots-group
analyzer.kafka.consumer.snapshots.topic=telemetry.snapshots.v1
analyzer.kafka.consumer.snapshots.max-poll-records=50

analyzer.kafka.consumer.hubs.group-id=analyzer-hubs-group
analyzer.kafka.consumer.hubs.topic=telemetry.hubs.v1
analyzer.kafka.consumer.hubs.max-poll-records=20

grpc.client.hub-router.address=static://localhost:59090
grpc.client.hub-router.enableKeepAlive=true
grpc.client.hub-router.keepAliveWithoutCalls=true
grpc.client.hub-router.negotiationType=plaintext

spring.datasource.url=jdbc:postgresql://localhost:6541/smart_home
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql

logging.level.ru.yandex.practicum=DEBUG
logging.level.org.apache.kafka=WARN
logging.level.org.springframework=ERROR